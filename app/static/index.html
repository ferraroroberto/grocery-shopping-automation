<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Grocery" />
    <link rel="icon" href="/app-icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <title>Inventory Helper</title>
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      (function () {
        var theme = localStorage.getItem("grocery.theme");
        if (theme !== "light" && theme !== "dark") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="/static/_vendored/nav/nav-tabs.css" />
    <link rel="stylesheet" href="/static/_vendored/card/card.css" />
    <link rel="stylesheet" href="/static/_vendored/disclosure/disclosure.css" />
    <link rel="stylesheet" href="/static/_vendored/modal/modal.css" />
    <link rel="stylesheet" href="/static/_vendored/switch/switch.css" />
    <link rel="stylesheet" href="/static/_vendored/empty-state/empty-state.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>

      <symbol id="i-package" viewBox="0 0 24 24" fill="none">
        <path d="m7.5 4.27 9 5.15" />
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />

      </symbol>
      <symbol id="i-bot" viewBox="0 0 24 24" fill="none">
        <path d="M12 8V4H8" />
        <rect width="16" height="12" x="4" y="8" rx="2" />
        <path d="M2 14h2" />
        <path d="M20 14h2" />

      </symbol>
      <symbol id="i-settings" viewBox="0 0 24 24" fill="none">

        <circle cx="12" cy="12" r="3" />

      <symbol id="i-refresh-cw" viewBox="0 0 24 24" fill="none">

        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />

      <symbol id="i-download" viewBox="0 0 24 24" fill="none">

      <symbol id="i-plus" viewBox="0 0 24 24" fill="none">
        <path d="M5 12h14" />

    </svg>

    <!-- Fleet bottom-tab nav — direct <body> child, sibling to <main class="app">
         (load-bearing for iOS PWA pinning; see _vendored/nav/README.md). -->
    <nav class="tabs" role="tablist" aria-label="Sections" data-active-tab="inventory">
      <button id="tabInventory" type="button" class="tab active" data-tab="inventory"
              role="tab" aria-selected="true" aria-controls="pane-inventory">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
          <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
        <span class="tab-emoji" aria-hidden="true">🏠</span>
        <span class="tab-label">Home</span>
      </button>
      <button id="tabShopping" type="button" class="tab" data-tab="shopping"
              role="tab" aria-selected="false" aria-controls="pane-shopping" tabindex="-1">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <circle cx="8" cy="21" r="1" />
          <circle cx="19" cy="21" r="1" />
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" />
        </svg>
        <span class="tab-emoji" aria-hidden="true">🛒</span>
        <span class="tab-label">Shop</span>
      </button>
      <button id="tabAudit" type="button" class="tab" data-tab="audit"
              role="tab" aria-selected="false" aria-controls="pane-audit" tabindex="-1">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="m3 17 2 2 4-4" />
          <path d="m3 7 2 2 4-4" />
          <path d="M13 6h8" />
          <path d="M13 12h8" />
          <path d="M13 18h8" />
        </svg>
        <span class="tab-emoji" aria-hidden="true">✅</span>
        <span class="tab-label">Audit</span>
      </button>
      <button id="tabItems" type="button" class="tab" data-tab="items"
              role="tab" aria-selected="false" aria-controls="pane-items" tabindex="-1">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="m7.5 4.27 9 5.15" />
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
          <path d="m3.3 7 8.7 5 8.7-5" />
          <path d="M12 22V12" />
        </svg>
        <span class="tab-emoji" aria-hidden="true">📦</span>
        <span class="tab-label">Items</span>
      </button>
      <button id="tabAutomation" type="button" class="tab" data-tab="automation"
              role="tab" aria-selected="false" aria-controls="pane-automation" tabindex="-1">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="M12 8V4H8" />
          <rect width="16" height="12" x="4" y="8" rx="2" />
          <path d="M2 14h2" />
          <path d="M20 14h2" />
          <path d="M15 13v2" />
          <path d="M9 13v2" />
        </svg>
        <span class="tab-emoji" aria-hidden="true">🤖</span>
        <span class="tab-label">Auto</span>
      </button>
      <button id="tabSettings" type="button" class="tab" data-tab="settings"
              role="tab" aria-selected="false" aria-controls="pane-settings" tabindex="-1">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        <span class="tab-emoji" aria-hidden="true">⚙️</span>
        <span class="tab-label">Settings</span>
      </button>
    </nav>

    <main class="app">
      <section id="pane-inventory" class="pane" role="tabpanel" aria-labelledby="tabInventory" aria-label="Inventory">
        <!-- Home-only header card (home-automation weather-tile pattern):
             app icon + title + status left, theme toggle right. Living inside
             the home pane keeps the toggle (and the row) off every other tab. -->
        <section class="card home-head" aria-label="Grocery">
          <h1 class="card-title">
            <svg class="icon" aria-hidden="true" focusable="false"><use href="#i-shopping-basket"></use></svg>
            Grocery
          </h1>
          <div id="status" class="status" role="status">Loading inventory...</div>
          <button id="theme-toggle" class="theme-toggle" type="button"
                  title="Toggle theme" aria-label="Toggle dark mode">
            <!-- Sprite moon + sun; CSS shows the glyph for the *action*
                 keyed on html[data-theme]. -->
            <svg class="theme-toggle-icon theme-icon-moon" aria-hidden="true" focusable="false"><use href="#i-moon"></use></svg>
            <svg class="theme-toggle-icon theme-icon-sun" aria-hidden="true" focusable="false"><use href="#i-sun"></use></svg>
          </button>
        </section>
        <!-- Search shows only on the modes that filter the item list
             (dashboard / audit / targets / edit) — app.js re-homes this node
             into the active pane BELOW the sub-mode pills, so the pills never
             move vertically when the search appears/disappears. -->
        <section id="toolbar" class="toolbar" aria-label="Inventory search" hidden>
          <input id="search" class="search" type="search" placeholder="Search item, zone, or supermarket" autocomplete="off" />
        </section>
        <div class="pane-body"></div>
      </section>
      <section id="pane-shopping" class="pane" role="tabpanel" aria-labelledby="tabShopping" aria-label="Shopping" hidden>
        <div class="pane-body"></div>
      </section>
      <section id="pane-audit" class="pane" role="tabpanel" aria-labelledby="tabAudit" aria-label="Audit" hidden>
        <div class="pills subnav" role="group" aria-label="Audit modes">
          <button type="button" class="pill" data-mode="audit">Audit</button>
          <button type="button" class="pill" data-mode="audio">Audio Audit</button>
        </div>
        <div class="pane-body"></div>
      </section>
      <section id="pane-items" class="pane" role="tabpanel" aria-labelledby="tabItems" aria-label="Items" hidden>
        <div class="pills subnav" role="group" aria-label="Item modes">
          <button type="button" class="pill" data-mode="targets">Targets</button>
          <button type="button" class="pill" data-mode="edit">Edit Item</button>
          <button type="button" class="pill" data-mode="add">Add Item</button>
        </div>
        <div class="pane-body"></div>
      </section>
      <section id="pane-automation" class="pane" role="tabpanel" aria-labelledby="tabAutomation" aria-label="Automation" hidden>
        <div class="pane-body"></div>
      </section>
      <section id="pane-settings" class="pane" role="tabpanel" aria-labelledby="tabSettings" aria-label="Settings" hidden>
        <div class="card">
          <div class="card-head">
            <h2 class="card-title">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="#i-settings"></use></svg>
              Settings
            </h2>
          </div>
          <div class="settings-actions">
            <button id="open-sheet" class="secondary" type="button">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="#i-external-link"></use></svg>
              Open Spreadsheet
            </button>
            <button id="copy-link" class="secondary" type="button">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="#i-link"></use></svg>
              Copy Link
            </button>
            <button id="export-csv" class="secondary" type="button">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="#i-download"></use></svg>
              Export CSV
            </button>
            <button id="close-app" class="secondary" type="button">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="#i-power"></use></svg>
              Close App
            </button>
          </div>
        </div>
      </section>

      <!-- Build identity: which build the PWA is running. Filled by app.js
           (fetchVersion), same contract as home-automation. -->
      <footer class="page-foot">
        <p id="build-readout" class="meta"></p>
      </footer>
    </main>

    <!-- Login is a native <dialog> (fleet modal contract); the bottom nav hides
         itself while it is open. No × close and Esc is blocked — auth is
         mandatory, the dialog closes only on a successful unlock. -->
    <dialog id="login-dialog" class="detail-dialog">
      <div class="detail-card">
        <div class="detail-header">
          <h2>Unlock Grocery</h2>
        </div>
        <form id="login-form">
          <div class="row">
            <input id="login-password" class="field" type="password" autocomplete="current-password" placeholder="Password" />
          </div>
          <div class="detail-actions">
            <button class="primary" type="submit">Unlock</button>
          </div>
          <div id="login-error" class="login-error"></div>
        </form>
      </div>
    </dialog>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
